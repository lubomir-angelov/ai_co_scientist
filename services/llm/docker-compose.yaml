version: "3.9"

name: ai-co-llm

services:
  # llm:
  #   image: vllm/vllm-openai:latest
  #   command: >
  #     --model ${LLM_MODEL:-deepseek-ai/DeepSeek-R1-Distill-Qwen-14B}
  #     --max-model-len 32768
  #     --gpu-memory-utilization 0.90
  #     --trust-remote-code
  #     --port 8000
  #   environment:
  #     VLLM_LOGGING_LEVEL: INFO
  #   ports:
  #     - "8000:8000"
  #   gpus: all
  #   healthcheck:
  #     test: ["CMD", "bash", "-lc", "curl -sf http://localhost:8000/v1/models > /dev/null"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 20
  #     start_period: 60s

  llm:
    image: docker.io/gtonkov/llamacpp-turboquant:latest
    container_name: ai-co-llm-llama-cpp
    restart: unless-stopped

    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"

      # llama.cpp router mode: load GGUF models from /models
      - --models-dir
      - /models
      - --models-max
      - "1"

      # Original runtime settings
      - --n-gpu-layers
      - "-1"
      - --mlock
      - --no-mmap
      - --ctx-size
      - "262144"
      - --batch-size
      - "2048"
      - --ubatch-size
      - "512"
      - -np
      - "1"
      - --cache-reuse
      - "256"
      - --cache-ram
      - "20000"
      - --cache-type-k
      - turbo4
      - --cache-type-v
      - turbo4
      - --flash-attn
      - "on"
      - --jinja
      - --temp
      - "0.6"
      - --top-p
      - "0.95"
      - --top-k
      - "20"
      - --min-p
      - "0.0"
      - --repeat-penalty
      - "1.0"
      - --presence-penalty
      - "0.0"

    volumes:
      - ../../models/hotswap:/models:ro
    
    environment:
      LLAMA_LOG_LEVEL: info

    ports:
      - "8000:8080"

    gpus: all

    cap_add:
      - IPC_LOCK

    ulimits:
      memlock:
        soft: -1
        hard: -1

    mem_limit: 64g

    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -sf http://localhost:8080/v1/models > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 60s

  llm-gateway:
    build: ./src/gateway
    environment:
      UPSTREAM_BASE_URL: http://llm:8080/v1
      API_KEY: ${LLM_API_KEY:-local-llm}
    ports:
      - "9000:8000"
    depends_on:
      llm:
        condition: service_healthy