name: ai-co-scientist

services:
  # LLM Service - llama.cpp turboquant hotswap server
  llm:
    image: docker.io/gtonkov/llamacpp-turboquant:latest
    container_name: ai-co-llm-llama-cpp
    restart: unless-stopped

    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"

      # llama.cpp router mode: load GGUF models from /models
      - --models-dir
      - /models
      - --models-max
      - "1"

      # Original runtime settings
      - --n-gpu-layers
      - "-1"
      - --mlock
      - --no-mmap

      # Use this for 256k context
      - --ctx-size
      - "262144"
      - --chat-template-kwargs
      - '{"enable_thinking":false}'

      - --batch-size
      - "2048"
      - --ubatch-size
      - "512"

      - -np
      - "1"

      - --cache-reuse
      - "256"
      - --cache-ram
      - "20000"

      - --cache-type-k
      - turbo4
      - --cache-type-v
      - turbo4

      - --flash-attn
      - "on"

      - --jinja

      - --temp
      - "0.6"
      - --top-p
      - "0.95"
      - --top-k
      - "20"
      - --min-p
      - "0.0"
      - --repeat-penalty
      - "1.0"
      - --presence-penalty
      - "0.0"

    volumes:
      - ./models/hotswap:/models:ro

    environment:
      LLAMA_LOG_LEVEL: info

    ports:
      - "8000:8080"     # host localhost:8000 -> container llm:8080

    gpus: all

    cap_add:
      - IPC_LOCK

    ulimits:
      memlock:
        soft: -1
        hard: -1

    mem_limit: 64g

    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -sf http://localhost:8080/v1/models > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 60s

  # LLM Gateway - OpenAI-compatible proxy with authentication
  llm-gateway:
    build: ./services/llm/src/gateway
    environment:
      UPSTREAM_BASE_URL: http://llm:8080/v1
      API_KEY: ${LLM_API_KEY:-local-llm}
    ports:
      - "9000:8000"     # public OpenAI-compatible entrypoint
    depends_on:
      llm:
        condition: service_healthy

  # OCR Service - DeepSeek OCR for document/image understanding
  # ocr:
  #   build:
  #     context: .
  #     dockerfile: ./services/ocr/Dockerfile
  #     args:
  #       BASE_IMAGE: nvidia/cuda:12.8.1-cudnn-devel-ubuntu22.04
  #       SERVICES_DIR: services
  #       SERVICE_NAME: ocr
  #   environment:
  #     CUDA_VISIBLE_DEVICES: "1"
  #     HF_HOME: /workspace/hf-cache
  #     TRANSFORMERS_ATTENTION_IMPLEMENTATION: eager
  #     TRANSFORMERS_NO_FLASH_ATTENTION: "1"
  #   ports:
  #     - "8002:8002"
  #   gpus:
  #     - device: 1
  #   depends_on:
  #     llm-gateway:
  #       condition: service_started
  #   healthcheck:
  #     test: ["CMD", "curl", "-sf", "http://localhost:8002/healthz"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 120s

  # Orchestrator - Agent loop that coordinates between services
  orchestrator:
    build:
      context: .
      dockerfile: ./services/octo_agent/Dockerfile
    environment:
      LLM_BASE_URL: http://llm-gateway:8000/v1
      LLM_API_KEY: ${LLM_API_KEY:-local-llm}
      OCR_BASE_URL: http://ocr:8002
    ports:
      - "8001:8000"
    depends_on:
      llm-gateway:
        condition: service_started
      # ocr:
      #   condition: service_healthy

  # NOTE: Memory service (graph store) is not included yet - implementation pending

networks:
  default:
    name: ai-co-scientist-network